<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CONEKTA Master Control</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at 50% 0%, rgba(124, 92, 255, 0.15), transparent 50%),
                  radial-gradient(circle at 0% 100%, rgba(0, 224, 184, 0.15), transparent 50%),
                  linear-gradient(180deg, #0a0e1a 0%, #1a1f35 100%);
      position: relative;
      overflow: hidden;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 224, 184, 0.1) 0%, transparent 70%);
      animation: pulse-glow 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.3;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 0.6;
        transform: translate(-50%, -50%) scale(1.1);
      }
    }

    .merkaba-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .merkaba-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(1.2) contrast(1.1);
      animation: merkaba-glow 6s ease-in-out infinite;
    }

    @keyframes merkaba-glow {
      0%, 100% {
        filter: brightness(1.2) contrast(1.1) drop-shadow(0 0 20px rgba(0, 224, 184, 0.3));
      }
      50% {
        filter: brightness(1.5) contrast(1.2) drop-shadow(0 0 40px rgba(0, 224, 184, 0.5));
      }
    }

    .login-box {
      width: 100%;
      max-width: 450px;
      padding: 48px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      background: rgba(15, 20, 35, 0.85);
      border: 1px solid rgba(0, 224, 184, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                  0 0 40px rgba(0, 224, 184, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-merkaba {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      position: relative;
    }

    .logo-merkaba img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(1.3) drop-shadow(0 0 20px rgba(0, 224, 184, 0.4));
      animation: logo-float 3s ease-in-out infinite;
    }

    @keyframes logo-float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .logo-text {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--teal), var(--violet), var(--teal));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: gradient-shift 3s ease infinite;
      letter-spacing: 2px;
    }

    @keyframes gradient-shift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    .logo-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 224, 184, 0.2);
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 20px rgba(0, 224, 184, 0.2);
      background: rgba(0, 0, 0, 0.4);
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .remember-me:hover {
      color: var(--teal);
    }

    .forgot-password {
      font-size: 13px;
      color: var(--teal);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .forgot-password:hover {
      color: var(--violet);
      text-shadow: 0 0 10px rgba(124, 92, 255, 0.5);
    }

    .btn-gradient {
      background: linear-gradient(135deg, var(--teal), var(--violet));
      background-size: 200% 200%;
      animation: gradient-shift 3s ease infinite;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0, 224, 184, 0.3);
      transition: all 0.3s ease;
    }

    .btn-gradient:hover {
      box-shadow: 0 15px 40px rgba(0, 224, 184, 0.5);
      transform: translateY(-2px);
    }

    .alert {
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 500;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: var(--error);
    }

    .alert-info {
      background: rgba(0, 224, 184, 0.15);
      border: 1px solid rgba(0, 224, 184, 0.4);
      color: var(--teal);
    }

    .default-credentials {
      margin-top: 32px;
      padding: 20px;
      background: rgba(0, 224, 184, 0.08);
      border: 1px solid rgba(0, 224, 184, 0.25);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.8;
    }

    .default-credentials strong {
      color: var(--teal);
      font-weight: 600;
      text-shadow: 0 0 10px rgba(0, 224, 184, 0.3);
    }

    .sacred-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal), transparent);
      margin: 16px auto;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .merkaba-container {
        width: 300px;
        height: 300px;
        opacity: 0.1;
      }

      .login-box {
        padding: 32px 24px;
      }

      .logo-merkaba {
        width: 90px;
        height: 90px;
      }

      .logo-text {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Background Merkaba -->
    <div class="merkaba-container">
      <img src="merkaba.jpg" alt="Sacred Geometry" class="merkaba-image">
    </div>

    <div class="login-box">
      <div class="logo">
        <div class="logo-merkaba">
          <img src="merkaba.jpg" alt="Merkaba">
        </div>
        <div class="logo-text glow">CONEKTA</div>
        <div class="sacred-divider"></div>
        <div class="logo-subtitle">Master Control System</div>
      </div>

      <div id="message-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">🔑 Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">🔐 Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-footer">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" name="remember_me">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-gradient w-full">
          ✨ Sign In ✨
        </button>
      </form>

      <div class="default-credentials">
        <strong>🔑 Default Credentials</strong>
        <div class="sacred-divider"></div>
        Username: <strong>admin</strong><br>
        Password: <strong>ConektaMamaDennis2024!</strong><br>
        <small style="opacity: 0.7;">(Change after first login)</small>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Override auth check for login page
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (Auth.isAuthenticated()) {
        window.location.href = '/admin/dashboard.html';
      }

      // Handle login form submission
      const loginForm = document.getElementById('login-form');
      const messageContainer = document.getElementById('message-container');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember-me').checked;

        // Show loading
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Signing in...';
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              username,
              password,
              remember_me: rememberMe
            })
          });

          const data = await response.json();

          if (data.success) {
            // Store token and user info
            Auth.setToken(data.token);
            Auth.setUser(data.user);

            // Show success message
            messageContainer.innerHTML = `
              <div class="alert alert-info">
                ✅ Login successful! Redirecting to dashboard...
              </div>
            `;

            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = '/admin/dashboard.html';
            }, 1000);
          } else {
            throw new Error(data.detail || 'Login failed');
          }
        } catch (error) {
          messageContainer.innerHTML = `
            <div class="alert alert-error">
              ❌ ${error.message || 'Login failed. Please check your credentials.'}
            </div>
          `;

          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
