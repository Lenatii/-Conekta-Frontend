<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - CONEKTA Master Control</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at 50% 0%, rgba(124, 92, 255, 0.1), transparent 50%),
                  radial-gradient(circle at 0% 100%, rgba(0, 224, 184, 0.1), transparent 50%);
    }

    .login-box {
      width: 100%;
      max-width: 450px;
      padding: 48px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--teal), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .form-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .forgot-password {
      font-size: 14px;
      color: var(--teal);
      text-decoration: none;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: var(--info);
    }

    .default-credentials {
      margin-top: 24px;
      padding: 16px;
      background: rgba(0, 224, 184, 0.05);
      border: 1px solid rgba(0, 224, 184, 0.2);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .default-credentials strong {
      color: var(--teal);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box glass">
      <div class="logo">
        <div class="logo-text glow">CONEKTA</div>
        <div class="logo-subtitle">Master Control System</div>
      </div>

      <div id="message-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="form-footer">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" name="remember_me">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-gradient w-full">
          Sign In
        </button>
      </form>

      <div class="default-credentials">
        <strong>🔑 Default Credentials:</strong><br>
        Username: <strong>admin</strong><br>
        Password: <strong>ConektaMamaDennis2024!</strong><br>
        <small>(Change after first login)</small>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Override auth check for login page
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (Auth.isAuthenticated()) {
        window.location.href = '/admin/dashboard.html';
      }

      // Handle login form submission
      const loginForm = document.getElementById('login-form');
      const messageContainer = document.getElementById('message-container');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember-me').checked;

        // Show loading
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Signing in...';
        submitBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE_URL}/api/admin/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              username,
              password,
              remember_me: rememberMe
            })
          });

          const data = await response.json();

          if (data.success) {
            // Store token and user info
            Auth.setToken(data.token);
            Auth.setUser(data.user);

            // Show success message
            messageContainer.innerHTML = `
              <div class="alert alert-info">
                ✅ Login successful! Redirecting to dashboard...
              </div>
            `;

            // Redirect to dashboard
            setTimeout(() => {
              window.location.href = '/admin/dashboard.html';
            }, 1000);
          } else {
            throw new Error(data.detail || 'Login failed');
          }
        } catch (error) {
          messageContainer.innerHTML = `
            <div class="alert alert-error">
              ❌ ${error.message || 'Login failed. Please check your credentials.'}
            </div>
          `;

          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
